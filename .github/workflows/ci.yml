name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux:
    name: Linux – ${{ matrix.name }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GCC 14 Release
            cc: gcc-14
            cxx: g++-14
            build_type: Release
            extra_flags: ""
            extra_packages: ""
            asan_options: ""
            ubsan_options: ""

          - name: GCC 14 ASan/UBSan
            cc: gcc-14
            cxx: g++-14
            build_type: Debug
            extra_flags: "-DENABLE_SANITIZERS=ON"
            extra_packages: ""
            asan_options: "halt_on_error=1:detect_leaks=1"
            ubsan_options: "halt_on_error=1:print_stacktrace=1"

          - name: Clang 18 clang-tidy
            cc: clang-18
            cxx: clang++-18
            build_type: Debug
            extra_flags: "-DENABLE_STATIC_ANALYZER=ON"
            extra_packages: "clang-18 clang-tidy-18"
            asan_options: ""
            ubsan_options: ""

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libudev-dev \
            libtinyxml2-dev \
            pybind11-dev \
            python3-dev \
            ${{ matrix.extra_packages }}

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DBUILD_TOOLS=ON \
            -DBUILD_TESTS=ON \
            -DBUILD_PYTHON_BINDINGS=ON \
            ${{ matrix.extra_flags }}

      - name: Build
        run: cmake --build build

      #- name: Test
      #  env:
      #    ASAN_OPTIONS: ${{ matrix.asan_options }}
      #    UBSAN_OPTIONS: ${{ matrix.ubsan_options }}
      #  run: ctest --test-dir build --output-on-failure

  windows:
    name: Windows (windows-2022, MSVC)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Install vcpkg dependencies
        run: vcpkg install tinyxml2 pybind11 getopt
        env:
          VCPKG_DEFAULT_TRIPLET: x64-windows

      - name: Configure
        run: |
          cmake -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DHID_BACKEND=windows `
            -DBUILD_TOOLS=ON `
            -DBUILD_TESTS=ON `
            -DBUILD_PYTHON_BINDINGS=ON `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release

      #- name: Test
      #  run: ctest --test-dir build -C Release --output-on-failure
